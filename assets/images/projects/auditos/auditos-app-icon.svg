<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

<!-- Background -->
<rect x="0" y="0" width="1024" height="1024" rx="220" fill="#0F172A"></rect>

<!-- Circuit Pattern -->
<g stroke="#22D3EE" stroke-width="6" opacity="0.35">
<line x1="100" y1="200" x2="300" y2="200"></line>
<line x1="300" y1="200" x2="300" y2="350"></line>
<line x1="300" y1="350" x2="500" y2="350"></line>

<line x1="900" y1="250" x2="700" y2="250"></line>
<line x1="700" y1="250" x2="700" y2="400"></line>

<line x1="150" y1="750" x2="350" y2="750"></line>
<line x1="350" y1="750" x2="350" y2="600"></line>

<line x1="850" y1="700" x2="650" y2="700"></line>
<line x1="650" y1="700" x2="650" y2="550"></line>

<circle cx="300" cy="200" r="10" fill="#22D3EE"></circle>
<circle cx="500" cy="350" r="10" fill="#22D3EE"></circle>
<circle cx="700" cy="250" r="10" fill="#22D3EE"></circle>
<circle cx="350" cy="750" r="10" fill="#22D3EE"></circle>
<circle cx="650" cy="700" r="10" fill="#22D3EE"></circle>
</g>

<!-- Magnifying Glass -->
<g transform="rotate(15 512 512)">
<circle cx="512" cy="480" r="230" fill="none" stroke="#C0C6CF" stroke-width="28"></circle>
<line x1="650" y1="650" x2="800" y2="800" stroke="#C0C6CF" stroke-width="40" stroke-linecap="round"></line>
</g>

<!-- Text -->
<g transform="rotate(-10 512 512)">
<text x="512" y="510" font-family="Helvetica, Arial, sans-serif" font-size="120" fill="#F8FAFC" text-anchor="middle" font-weight="700" style="filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.4));">
AuditOS
</text>
</g>

</svg>